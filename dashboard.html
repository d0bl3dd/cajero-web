<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoBank Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: Inter, sans-serif; }
    </style>
</head>

<body class="bg-slate-950 text-white">

    <div class="p-10">

        <h1 id="bienvenida" class="text-4xl font-bold"></h1>

        <p class="mt-4">Cuenta: <span id="numeroCuenta"></span></p>

        <p class="mt-4 text-2xl font-bold">
            Saldo: $<span id="saldo"></span>
        </p>

        <button id="cerrarSesion"
            class="mt-10 bg-red-500 px-6 py-3 rounded-xl">
            Cerrar sesión
        </button>

    </div>

    <script src="dashboard.js"></script>
</body>

</html>
