<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kajero | Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

</head>

<body class="min-h-screen bg-[#020617] text-white overflow-x-hidden">

<div class="fixed inset-0 -z-10 overflow-hidden">

<div class="absolute top-[-150px] left-[-120px] w-[450px] h-[450px] bg-blue-600/30 rounded-full blur-3xl animate-pulse"></div>

<div class="absolute bottom-[-150px] right-[-120px] w-[450px] h-[450px] bg-cyan-500/30 rounded-full blur-3xl animate-pulse"></div>

<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.04)_1px,transparent_1px)] bg-[size:22px_22px]"></div>

</div>

<div class="max-w-7xl mx-auto p-4 md:p-8">

<div class="flex flex-col lg:flex-row gap-6">

<div class="w-full lg:w-[280px] bg-white/5 border border-white/10 backdrop-blur-2xl rounded-[32px] p-6 shadow-2xl">

<div class="flex items-center gap-4">

<div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-3xl shadow-2xl">

<i class="fa-solid fa-building-columns"></i>

</div>

<div>

<h1 class="text-3xl font-black">
Kajero
</h1>

<p class="text-slate-400 text-sm">
Digital Banking
</p>

</div>

</div>

<div class="mt-10 flex flex-col gap-4">

<button class="bg-blue-500/15 border border-blue-500/20 text-blue-300 rounded-2xl py-4 font-semibold hover:bg-blue-500/20 transition">

<i class="fa-solid fa-house mr-2"></i>
Inicio

</button>

<button class="bg-white/5 border border-white/10 rounded-2xl py-4 font-semibold hover:bg-white/10 transition">

<i class="fa-solid fa-money-bill-transfer mr-2"></i>
Transferencias

</button>

<button class="bg-white/5 border border-white/10 rounded-2xl py-4 font-semibold hover:bg-white/10 transition">

<i class="fa-solid fa-clock-rotate-left mr-2"></i>
Movimientos

</button>

<button class="bg-white/5 border border-white/10 rounded-2xl py-4 font-semibold hover:bg-white/10 transition">

<i class="fa-solid fa-gear mr-2"></i>
Configuración

</button>

</div>

<button
id="logout"
class="mt-10 w-full bg-gradient-to-r from-red-500 to-rose-600 hover:scale-[1.02] transition rounded-2xl py-4 font-bold shadow-xl"
>

<i class="fa-solid fa-right-from-bracket mr-2"></i>
Cerrar sesión

</button>

</div>

<div class="flex-1">

<div class="bg-white/5 border border-white/10 backdrop-blur-2xl rounded-[32px] p-6 md:p-8 shadow-2xl">

<div class="flex flex-col xl:flex-row gap-6 xl:items-center xl:justify-between">

<div>

<p class="text-slate-400 text-sm uppercase tracking-[4px]">
Bienvenido
</p>

<h2
id="nombre"
class="text-4xl md:text-5xl font-black mt-3 bg-gradient-to-r from-white via-blue-400 to-cyan-400 bg-clip-text text-transparent break-words"
>

Cargando...

</h2>

<p class="text-slate-400 mt-4 text-lg">
Gestiona tus movimientos bancarios digitales
</p>

</div>

<div class="bg-gradient-to-br from-blue-600 to-cyan-500 rounded-[30px] p-7 min-w-[300px] shadow-2xl">

<div class="flex justify-between items-start">

<div>

<p class="text-white/70 text-sm">
Saldo disponible
</p>

<h2
id="saldo"
class="text-5xl font-black mt-3 break-words"
>

$ 0

</h2>

</div>

<div class="text-5xl text-white/80">
<i class="fa-solid fa-wallet"></i>
</div>

</div>

<div class="mt-8 flex items-center justify-between">

<div>

<p class="text-white/60 text-xs uppercase">
Cuenta
</p>

<p
id="cuenta"
class="text-xl font-bold mt-1 tracking-widest"
>

----

</p>

</div>

<div class="text-right">

<p class="text-white/60 text-xs uppercase">
Estado
</p>

<p class="text-green-300 font-bold mt-1">
Activa
</p>

</div>

</div>

</div>

</div>

<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mt-10">

<div class="bg-white/5 border border-white/10 rounded-[28px] p-6 hover:translate-y-[-4px] transition">

<div class="w-16 h-16 rounded-2xl bg-green-500/20 text-green-400 flex items-center justify-center text-3xl">

<i class="fa-solid fa-circle-plus"></i>

</div>

<h2 class="text-2xl font-black mt-6">
Depositar
</h2>

<p class="text-slate-400 mt-2">
Agrega dinero a tu cuenta
</p>

<input
id="deposito"
type="number"
placeholder="Ingrese monto"
class="w-full mt-6 bg-slate-900/80 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-green-500 transition"
/>

<button
onclick="depositar()"
class="w-full mt-5 bg-gradient-to-r from-green-500 to-emerald-600 hover:scale-[1.02] transition rounded-2xl py-4 font-bold shadow-xl"
>

Depositar

</button>

</div>

<div class="bg-white/5 border border-white/10 rounded-[28px] p-6 hover:translate-y-[-4px] transition">

<div class="w-16 h-16 rounded-2xl bg-red-500/20 text-red-400 flex items-center justify-center text-3xl">

<i class="fa-solid fa-circle-minus"></i>

</div>

<h2 class="text-2xl font-black mt-6">
Retirar
</h2>

<p class="text-slate-400 mt-2">
Retira dinero de tu cuenta
</p>

<input
id="retiro"
type="number"
placeholder="Ingrese monto"
class="w-full mt-6 bg-slate-900/80 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-red-500 transition"
/>

<button
onclick="retirar()"
class="w-full mt-5 bg-gradient-to-r from-red-500 to-rose-600 hover:scale-[1.02] transition rounded-2xl py-4 font-bold shadow-xl"
>

Retirar

</button>

</div>

<div class="bg-white/5 border border-white/10 rounded-[28px] p-6 hover:translate-y-[-4px] transition md:col-span-2 xl:col-span-1">

<div class="w-16 h-16 rounded-2xl bg-cyan-500/20 text-cyan-400 flex items-center justify-center text-3xl">

<i class="fa-solid fa-chart-line"></i>

</div>

<h2 class="text-2xl font-black mt-6">
Actividad
</h2>

<div class="mt-6 flex flex-col gap-4">

<div class="bg-white/5 rounded-2xl p-4 border border-white/5">

<p class="text-slate-400 text-sm">
Último ingreso
</p>

<h3 class="text-2xl font-black mt-1 text-green-400">
+$ 120.000
</h3>

</div>

<div class="bg-white/5 rounded-2xl p-4 border border-white/5">

<p class="text-slate-400 text-sm">
Último retiro
</p>

<h3 class="text-2xl font-black mt-1 text-red-400">
-$ 50.000
</h3>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
