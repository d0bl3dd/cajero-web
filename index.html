<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoBank | Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: Inter, sans-serif; }
    </style>
</head>

<body class="bg-slate-950 flex items-center justify-center min-h-screen">

    <div class="bg-slate-900 p-10 rounded-3xl w-full max-w-md border border-white/10">

        <h1 class="text-white text-3xl font-bold mb-6">NeoBank Login</h1>

        <input id="cuenta" placeholder="Cuenta"
            class="w-full p-4 mb-4 rounded-xl bg-slate-800 text-white outline-none">

        <input id="pin" type="password" placeholder="PIN"
            class="w-full p-4 mb-4 rounded-xl bg-slate-800 text-white outline-none">

        <button id="btnLogin"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold">
            Ingresar
        </button>

        <p id="mensaje" class="text-red-400 mt-4 text-center"></p>

    </div>

    <script src="app.js"></script>
</body>

</html>
