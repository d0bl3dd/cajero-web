<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoBank Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-slate-950 flex items-center justify-center min-h-screen">

<div class="bg-slate-900 p-8 rounded-2xl w-full max-w-md">

<h1 class="text-white text-2xl mb-6">Login NeoBank</h1>

<input id="cuenta" placeholder="Cuenta"
class="w-full p-3 mb-3 rounded bg-slate-800 text-white">

<input id="pin" placeholder="PIN" type="password"
class="w-full p-3 mb-3 rounded bg-slate-800 text-white">

<button id="btnLogin"
class="w-full bg-blue-600 p-3 rounded text-white font-bold">
Ingresar
</button>

<p id="mensaje" class="text-red-400 mt-3"></p>

</div>

<script src="app.js"></script>

</body>
</html>
